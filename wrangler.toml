name = "rtg"
main = "src/worker.js"
compatibility_date = "2024-05-01"

# ============================================================
# STATIC ASSETS (PUBLIC FOLDER)
# ============================================================
assets = { directory = "./public" }

# ============================================================
# D1 DATABASE
# ============================================================
[[d1_databases]]
binding = "DB"
database_name = "rtg-db"
database_id = "3592ad5b-c7a0-46b3-90ce-dfb8e7a67ff4"

# ============================================================
# R2 BUCKET
# ============================================================
[[r2_buckets]]
binding = "R2"
bucket_name = "rtg-online"
