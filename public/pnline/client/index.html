<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Real Tree Guy Online – Client</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background:#f5f5f5; }
    header { padding: 12px 16px; background:#0f172a; color:#fff; display:flex; justify-content:space-between; align-items:center; }
    header h1 { font-size:18px; margin:0; }
    header nav a { color:#e5e7eb; margin-left:12px; text-decoration:none; font-size:14px; }
    main { display:flex; min-height:calc(100vh - 48px); }
    aside { width:220px; background:#111827; color:#9ca3af; padding:16px 0; }
    aside a { display:block; padding:8px 16px; color:#9ca3af; text-decoration:none; font-size:14px; }
    aside a.active, aside a:hover { background:#1f2937; color:#fff; }
    section { flex:1; padding:16px; }
    h2 { margin-top:0; }
    .card { background:#fff; border-radius:8px; padding:12px 14px; margin-bottom:12px; box-shadow:0 1px 2px rgba(0,0,0,.06); }
    label { display:block; font-size:13px; margin-bottom:8px; }
    input, textarea, select { width:100%; padding:8px; margin-top:4px; border-radius:4px; border:1px solid #d1d5db; font-size:14px; }
    button { padding:8px 14px; border-radius:4px; border:none; background:#16a34a; color:#fff; font-size:14px; cursor:pointer; }
    button.secondary { background:#0f172a; }
    .row { display:flex; gap:12px; }
    .row > div { flex:1; }
    .jobs-list, .messages-list { font-size:14px; }
    .job-item, .msg-item { padding:8px 10px; border-radius:6px; background:#fff; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
    .badge { font-size:11px; padding:2px 6px; border-radius:999px; background:#e5e7eb; margin-left:6px; }
    .badge.storm { background:#fee2e2; color:#b91c1c; }
  </style>
</head>
<body>
<header>
  <h1>Real Tree Guy Online – Client</h1>
  <nav>
    <a href="/online/treeguy/index.html">Tree Guy Login</a>
  </nav>
</header>

<main>
  <aside>
    <a href="#" data-view="overview" class="active">Overview</a>
    <a href="#" data-view="post-job">Post Job</a>
    <a href="#" data-view="storm">Storm Damage</a>
    <a href="#" data-view="jobs">My Jobs</a>
    <a href="#" data-view="messages">Messages</a>
    <a href="#" data-view="billing">Billing</a>
    <a href="#" data-view="settings">Settings</a>
  </aside>

  <section id="view-container"></section>
</main>

<script>
  const state = {
    jobs: [],
    messages: [],
    billing: [],
    client: {
      name: "Sample Client",
      phone: "",
      email: "client@example.com"
    }
  };

  const viewContainer = document.getElementById("view-container");
  const navLinks = document.querySelectorAll("aside a");

  navLinks.forEach(link => {
    link.addEventListener("click", e => {
      e.preventDefault();
      navLinks.forEach(l => l.classList.remove("active"));
      link.classList.add("active");
      const view = link.getAttribute("data-view");
      renderView(view);
    });
  });

  function renderView(view) {
    if (view === "overview") return renderOverview();
    if (view === "post-job") return renderPostJob(false);
    if (view === "storm") return renderPostJob(true);
    if (view === "jobs") return renderJobs();
    if (view === "messages") return renderMessages();
    if (view === "billing") return renderBilling();
    if (view === "settings") return renderSettings();
  }

  function renderOverview() {
    const openJobs = state.jobs.filter(j => j.status === "open").length;
    const activeJobs = state.jobs.filter(j => j.status === "active").length;
    viewContainer.innerHTML = `
      <h2>Overview</h2>
      <div class="row">
        <div class="card">
          <strong>Open Jobs</strong><br>${openJobs}
        </div>
        <div class="card">
          <strong>Active Tree Guys</strong><br>${activeJobs}
        </div>
        <div class="card">
          <strong>Pending Contracts</strong><br>0
        </div>
      </div>
    `;
  }

  function renderPostJob(isStorm) {
    viewContainer.innerHTML = `
      <h2>${isStorm ? "Storm Damage Request" : "Post a Tree Job"}</h2>
      <div class="card">
        <form id="job-form">
          <label>Job Title
            <input type="text" name="title" required placeholder="${isStorm ? "Emergency storm cleanup" : "Oak removal in backyard"}">
          </label>
          <label>Description
            <textarea name="description" required rows="4" placeholder="${isStorm ? "Tree on house, power lines nearby, urgent." : "Large oak over driveway, want full removal."}"></textarea>
          </label>
          <label>Address
            <input type="text" name="address" required>
          </label>
          <div class="row">
            <div>
              <label>Budget (optional)
                <input type="number" name="budget" min="0">
              </label>
            </div>
            <div>
              <label>Photos (placeholder)
                <input type="file" multiple>
              </label>
            </div>
          </div>
          <input type="hidden" name="storm" value="${isStorm ? "1" : "0"}">
          <button type="submit">${isStorm ? "Submit Storm Request ($40)" : "Publish Job ($20)"}</button>
        </form>
      </div>
    `;
    document.getElementById("job-form").addEventListener("submit", e => {
      e.preventDefault();
      const form = e.target;
      const data = Object.fromEntries(new FormData(form).entries());
      const job = {
        id: "job_" + Date.now(),
        title: data.title,
        description: data.description,
        address: data.address,
        budget: data.budget || null,
        storm: data.storm === "1",
        status: "open",
        createdAt: new Date().toISOString()
      };
      state.jobs.unshift(job);
      state.billing.unshift({
        id: "bill_" + Date.now(),
        type: job.storm ? "Storm job posting" : "Job posting",
        amount: job.storm ? 40 : 20,
        createdAt: new Date().toISOString()
      });
      alert("Job posted. This will appear in the lead pool for tree guys.");
      renderJobs();
      document.querySelector('aside a[data-view="jobs"]').classList.add("active");
      document.querySelector('aside a[data-view="post-job"]').classList.remove("active");
    });
  }

  function renderJobs() {
    if (!state.jobs.length) {
      viewContainer.innerHTML = `
        <h2>My Jobs</h2>
        <div class="card">No jobs yet. Post one from “Post Job” or “Storm Damage”.</div>
      `;
      return;
    }
    const items = state.jobs.map(job => `
      <div class="job-item">
        <div>
          <strong>${job.title}</strong>
          ${job.storm ? '<span class="badge storm">Storm</span>' : ""}
          <div style="font-size:12px;color:#6b7280;">${job.address}</div>
        </div>
        <div style="text-align:right;font-size:12px;">
          <div>Status: ${job.status}</div>
          <button class="secondary" data-job="${job.id}">View</button>
        </div>
      </div>
    `).join("");
    viewContainer.innerHTML = `
      <h2>My Jobs</h2>
      <div class="jobs-list">${items}</div>
    `;
    document.querySelectorAll(".job-item button").forEach(btn => {
      btn.addEventListener("click", () => {
        const job = state.jobs.find(j => j.id === btn.getAttribute("data-job"));
        if (!job) return;
        alert("Job detail placeholder. Here you’ll show connected tree guys, bids, and contract.");
      });
    });
  }

  function renderMessages() {
    if (!state.messages.length) {
      viewContainer.innerHTML = `
        <h2>Messages</h2>
        <div class="card">No messages yet. Tree guys can message you after unlocking your leads.</div>
      `;
      return;
    }
    const items = state.messages.map(m => `
      <div class="msg-item">
        <div>
          <strong>${m.from}</strong>
          <div style="font-size:12px;color:#6b7280;">${m.preview}</div>
        </div>
        <button class="secondary">Open</button>
      </div>
    `).join("");
    viewContainer.innerHTML = `
      <h2>Messages</h2>
      <div class="messages-list">${items}</div>
    `;
  }

  function renderBilling() {
    if (!state.billing.length) {
      viewContainer.innerHTML = `
        <h2>Billing</h2>
        <div class="card">No charges yet.</div>
      `;
      return;
    }
    const rows = state.billing.map(b => `
      <div class="job-item">
        <div>
          <strong>${b.type}</strong>
          <div style="font-size:12px;color:#6b7280;">${new Date(b.createdAt).toLocaleString()}</div>
        </div>
        <div>$${b.amount}</div>
      </div>
    `).join("");
    viewContainer.innerHTML = `
      <h2>Billing</h2>
      <div class="jobs-list">${rows}</div>
    `;
  }

  function renderSettings() {
    viewContainer.innerHTML = `
      <h2>Settings</h2>
      <div class="card">
        <form id="settings-form">
          <label>Name
            <input type="text" name="name" value="${state.client.name}">
          </label>
          <label>Phone
            <input type="tel" name="phone" value="${state.client.phone}">
          </label>
          <label>Email
            <input type="email" name="email" value="${state.client.email}">
          </label>
          <button type="submit">Save</button>
        </form>
      </div>
    `;
    document.getElementById("settings-form").addEventListener("submit", e => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target).entries());
      state.client = data;
      alert("Settings saved (front-end only placeholder).");
    });
  }

  renderView("overview");
</script>
</body>
</html>
