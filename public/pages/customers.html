<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customers & Jobs – Real Tree Guy OS</title>

  <link rel="icon" type="image/png" href="../../assets/icons/rtg-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../../assets/css/customers.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: url("/assets/img/backgrounds/rtg-contacts-back.jpg") no-repeat center center fixed;
      background-size: cover;
      backdrop-filter: blur(2px);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .overlay {
      background: rgba(0,0,0,0.55);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .rtg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
    }

    .rtg-header h1,
    .rtg-header a {
      color: #fff;
    }

    .rtg-header a {
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .rtg-header a:hover {
      opacity: 1;
    }

    .rtg-header-actions {
      display: flex;
      gap: 8px;
    }

    .rtg-header-actions button {
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .btn-calendar {
      background: rgba(0, 180, 120, 0.9);
      color: #fff;
    }

    .btn-contracts {
      background: rgba(0, 120, 220, 0.9);
      color: #fff;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 0 24px 12px;
    }

    .tab-btn {
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .tab-btn.active {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
    }

    .layout-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1.6fr);
      gap: 16px;
      padding: 0 24px 24px;
    }

    .card {
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 16px;
    }

    h2 {
      color: #fff;
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 1.1rem;
    }

    label {
      display: block;
      margin-top: 8px;
      margin-bottom: 4px;
      color: #fff;
      font-size: 0.85rem;
    }

    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid rgba(0,0,0,0.3);
      background: rgba(255,255,255,0.9);
      font-size: 0.9rem;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    button.primary {
      margin-top: 12px;
      padding: 8px 14px;
      border-radius: 4px;
      border: none;
      background: #00b46c;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button.primary:hover {
      background: #00c47a;
    }

    .customer-list,
    .job-list {
      list-style: none;
      padding: 0;
      margin: 0;
      max-height: 420px;
      overflow-y: auto;
    }

    .customer-list li,
    .job-list li {
      padding: 10px 10px 10px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      position: relative;
      color: #fff;
      font-size: 0.9rem;
    }

    .empty-note {
      text-align: center;
      opacity: 0.8;
      font-style: italic;
    }

    .del-btn {
      position: absolute;
      left: 8px;
      top: 10px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.7);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .del-btn:hover {
      color: #ff6666;
    }

    .cust-name,
    .job-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .cust-details,
    .job-details {
      font-size: 0.85rem;
      opacity: 0.9;
    }

    .badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 999px;
      font-size: 0.7rem;
      margin-left: 6px;
    }

    .badge-potential {
      background: rgba(255, 196, 0, 0.25);
      color: #ffd76a;
      border: 1px solid rgba(255, 196, 0, 0.5);
    }

    .badge-scheduled {
      background: rgba(0, 180, 255, 0.25);
      color: #7fd3ff;
      border: 1px solid rgba(0, 180, 255, 0.5);
    }

    .badge-complete {
      background: rgba(0, 200, 120, 0.25);
      color: #8ff7c0;
      border: 1px solid rgba(0, 200, 120, 0.5);
    }

    .link-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
      font-size: 0.8rem;
    }

    .link-row button {
      border: none;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .btn-link-calendar {
      background: rgba(0, 180, 120, 0.8);
      color: #fff;
    }

    .btn-link-contract {
      background: rgba(0, 120, 220, 0.8);
      color: #fff;
    }

    @media (max-width: 900px) {
      .layout-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
<div class="overlay">

  <header class="rtg-header">
    <div>
      <h1>🌳 Customers & Jobs</h1>
      <a class="back-link" href="../../pages/dashboard.html">← Back to Dashboard</a>
    </div>
    <div class="rtg-header-actions">
      <button class="btn-calendar" id="openCalendar">📅 Open Calendar</button>
      <button class="btn-contracts" id="openContracts">📄 Contracts</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" data-tab="customers">Customers</button>
    <button class="tab-btn" data-tab="jobs">Jobs</button>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="layout-grid">

    <!-- CUSTOMERS TAB -->
    <div class="tab-panel active" id="tab-customers">
      <div class="card">
        <h2>Add Customer</h2>

        <label>Name</label>
        <input id="custName" placeholder="Full name">

        <label>Phone</label>
        <input id="custPhone" placeholder="(555) 000-0000">

        <label>Email</label>
        <input id="custEmail" placeholder="email@example.com">

        <label>Address</label>
        <input id="custAddress" placeholder="123 Main St, City, State">

        <label>Job Description (optional)</label>
        <textarea id="custNotes" placeholder="Scope, hazards, access, notes…"></textarea>

        <button id="addCust" class="primary">Save Customer</button>
      </div>
    </div>

    <div class="tab-panel active" id="tab-customers-list">
      <div class="card">
        <h2>Customer List</h2>
        <ul class="customer-list" id="custList">
          <li class="empty-note">No customers saved yet.</li>
        </ul>
      </div>
    </div>

    <!-- JOBS TAB -->
    <div class="tab-panel" id="tab-jobs">
      <div class="card">
        <h2>Add Job</h2>

        <label>Job Title</label>
        <input id="jobTitle" placeholder="e.g. Oak removal – 123 Elm St">

        <label>Customer Name</label>
        <input id="jobCust" placeholder="Customer's name">

        <label>Date</label>
        <input id="jobDate" type="date">

        <label>Price</label>
        <input id="jobPrice" placeholder="e.g. $850.00">

        <label>Status</label>
        <select id="jobStatus">
          <option value="potential">Potential</option>
          <option value="scheduled">Scheduled</option>
          <option value="complete">Complete</option>
        </select>

        <label>Notes</label>
        <textarea id="jobNotes" placeholder="Scope, access info, equipment, crew notes…"></textarea>

        <button id="addJob" class="primary">Save Job</button>

        <div class="link-row">
          <button class="btn-link-calendar" id="linkJobCalendar">Link to Calendar</button>
          <button class="btn-link-contract" id="linkJobContract">Generate Contract</button>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab-jobs-list">
      <div class="card">
        <h2>Job List</h2>
        <ul class="job-list" id="jobList">
          <li class="empty-note">No jobs saved yet.</li>
        </ul>
      </div>
    </div>

  </div>

</div>

  <!-- DB ENGINE FIRST -->
  <script type="module" src="../../assets/js/db.js"></script>

  <!-- CUSTOMERS/JOBS LOGIC SECOND -->
  <script type="module" src="/pages/assets/js/customers.js"></script>

  <script>
    // Simple front-end hooks for calendar/contracts integration
    document.getElementById("openCalendar")?.addEventListener("click", () => {
      window.location.href = "../../pages/calendar.html";
    });

    document.getElementById("openContracts")?.addEventListener("click", () => {
      window.location.href = "../../pages/contracts.html";
    });

    document.getElementById("linkJobCalendar")?.addEventListener("click", () => {
      // Placeholder: this will call work-calendar.js later with selected job
      alert("This will link the current job to the calendar (work-calendar.js).");
    });

    document.getElementById("linkJobContract")?.addEventListener("click", () => {
      // Placeholder: this will call work-contracts.js later with selected job + customer
      alert("This will generate a contract for the current job (work-contracts.js).");
    });

    // Tab logic upgrade: customers vs jobs views
    const tabButtons = document.querySelectorAll(".tab-btn");
    const panels = {
      customers: ["tab-customers", "tab-customers-list"],
      jobs: ["tab-jobs", "tab-jobs-list"]
    };

    tabButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        tabButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        const target = btn.dataset.tab;
        Object.values(panels).flat().forEach(id => {
          document.getElementById(id).classList.remove("active");
        });
        panels[target].forEach(id => {
          document.getElementById(id).classList.add("active");
        });
      });
    });
  </script>

</body>
</html>
