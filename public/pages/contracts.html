<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contracts – Real Tree Guy OS</title>

  <link rel="icon" type="image/png" href="../../assets/icons/rtg-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../../assets/css/contracts.css">
</head>

<body>

  <header class="rtg-header">
    <h1>📄 Contracts Generator</h1>
    <a class="back-link" href="../../pages/dashboard.html">← Back to Dashboard</a>
  </header>

  <div class="contract-card">

    <h2>Client Information</h2>

    <label>Client Name</label>
    <input id="clientName" placeholder="Full name">

    <label>Phone</label>
    <input id="clientPhone" placeholder="(555) 000-0000">

    <label>Email</label>
    <input id="clientEmail" type="email" placeholder="client@email.com">

    <label>Property Address</label>
    <input id="clientAddress" placeholder="123 Main St, City, State">

    <label>Scope of Work</label>
    <textarea id="scope" placeholder="Describe the tree work in detail…"></textarea>

    <label>Total Price</label>
    <input id="price" placeholder="e.g. $850.00">

    <div class="action-row">
      <button id="fill">Preview Contract</button>
      <button id="send">Send via Email</button>
      <button id="save">Save</button>
      <button id="calendar">Add to Calendar</button>
    </div>

    <div id="previewBox">
      Fill out the form above and click Preview to generate the contract.
    </div>

  </div>

  <!-- DB ENGINE FIRST -->
  <script type="module" src="../../assets/js/db.js"></script>

  <!-- CONTRACT LOGIC SECOND -->
  <script type="module" src="../assets/js/contracts.js"></script>

</body>
</html>
