<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contracts – Real Tree Guy OS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../../assets/icons/rtg-192.png">

  <link rel="stylesheet" href="css/contracts.css">
</head>

<body>

  <header class="rtg-header">
    <h1>📄 Contracts</h1>
    <a class="back-link" href="../dashboard.html">← Back to Dashboard</a>
  </header>

  <!-- COMPACT CONTRACTS WIDGET -->
  <main class="contracts-shell">
    <section class="contracts-widget" id="contractsWidget">
      <h2>Quick Contract</h2>

      <div class="field-row">
        <input id="cName" placeholder="Client name">
      </div>

      <div class="field-row">
        <input id="cPhone" placeholder="Phone">
      </div>

      <div class="field-row">
        <input id="cEmail" placeholder="Email">
      </div>

      <div class="field-row">
        <input id="cAddress" placeholder="Address">
      </div>

      <div class="field-row">
        <textarea id="cScope" rows="2" placeholder="Scope of work"></textarea>
      </div>

      <div class="field-row">
        <input id="cPrice" placeholder="Price">
      </div>

      <div class="btn-row">
        <button id="cPreviewBtn">Preview</button>
        <button id="cSaveBtn">Save</button>
      </div>

      <div class="btn-row">
        <button id="cEmailBtn">Email</button>
        <button id="cCalBtn">Calendar</button>
      </div>

      <div id="cPreviewBox" class="preview-box">
        Fill fields and tap Preview.
      </div>
    </section>
  </main>

  <script src="js/contracts.js"></script>
</body>
</html>
