<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contracts – Real Tree Guy OS</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../../assets/icons/rtg-192.png">

  <link rel="stylesheet" href="/assets/css/contracts.css">
</head>

<body>

  <header class="rtg-header">
    <h1>📄 Contracts Center</h1>
    <a class="back-link" href="../dashboard.html">← Back to Dashboard</a>
  </header>

  <!-- USER LOGO -->
  <div class="logo-box">
    <img id="userLogo" src="/assets/img/default-logo.png" alt="User Logo">
  </div>

  <!-- TABS -->
  <nav class="contracts-tabs">
    <button class="tab-btn active" data-doc="contract">Contract</button>
    <button class="tab-btn" data-doc="estimate">Estimate</button>
    <button class="tab-btn" data-doc="proposal">Proposal</button>
    <button class="tab-btn" data-doc="invoice">Invoice</button>
  </nav>

  <main class="contracts-shell">

    <!-- ============================
         DYNAMIC DOCUMENT FORM
    ============================= -->
    <section id="docForm" class="contracts-widget">
      <!-- JS injects the correct template here -->
      <p class="placeholder-msg">Select a document type to begin.</p>
    </section>

    <!-- ============================
         UNIVERSAL PREVIEW PANEL
    ============================= -->
    <section class="preview-panel">
      <h3>Preview</h3>
      <div id="previewContent" class="preview-box">
        Fill fields and tap Preview.
      </div>
    </section>

  </main>

  <script>
    /* ============================================================
       PROFILE DATA (D1 READY)
       Replace these with your D1 fetch later
    ============================================================= */
    const userProfile = {
      name: "John Doe",
      phone: "(555) 555-5555",
      email: "john@example.com",
      address: "123 Oak Street, Atlanta GA"
    };

    /* ============================================================
       DOCUMENT TEMPLATES
       Only job-specific fields appear here
    ============================================================= */
    const templates = {
      contract: `
        <h2>Quick Contract</h2>

        <div class="auto-info">
          <p><strong>Client:</strong> ${userProfile.name}</p>
          <p><strong>Phone:</strong> ${userProfile.phone}</p>
          <p><strong>Email:</strong> ${userProfile.email}</p>
          <p><strong>Address:</strong> ${userProfile.address}</p>
        </div>

        <div class="field-row"><textarea id="scope" placeholder="Scope of work"></textarea></div>
        <div class="field-row"><input id="price" placeholder="Price"></div>

        <div class="btn-row">
          <button onclick="previewDoc('Contract')">Preview</button>
          <button onclick="saveDoc('Contract')">Save</button>
          <button onclick="emailDoc('Contract')">Email</button>
        </div>
      `,

      estimate: `
        <h2>Quick Estimate</h2>

        <div class="auto-info">
          <p><strong>Client:</strong> ${userProfile.name}</p>
          <p><strong>Phone:</strong> ${userProfile.phone}</p>
          <p><strong>Email:</strong> ${userProfile.email}</p>
          <p><strong>Address:</strong> ${userProfile.address}</p>
        </div>

        <div class="field-row"><textarea id="scope" placeholder="Work description"></textarea></div>
        <div class="field-row"><input id="labor" placeholder="Labor cost"></div>
        <div class="field-row"><input id="materials" placeholder="Materials cost"></div>

        <div class="btn-row">
          <button onclick="previewDoc('Estimate')">Preview</button>
          <button onclick="saveDoc('Estimate')">Save</button>
          <button onclick="emailDoc('Estimate')">Email</button>
        </div>
      `,

      proposal: `
        <h2>Quick Proposal</h2>

        <div class="auto-info">
          <p><strong>Client:</strong> ${userProfile.name}</p>
          <p><strong>Phone:</strong> ${userProfile.phone}</p>
          <p><strong>Email:</strong> ${userProfile.email}</p>
          <p><strong>Address:</strong> ${userProfile.address}</p>
        </div>

        <div class="field-row"><textarea id="overview" placeholder="Project overview"></textarea></div>
        <div class="field-row"><textarea id="deliverables" placeholder="Deliverables"></textarea></div>
        <div class="field-row"><input id="price" placeholder="Total price"></div>

        <div class="btn-row">
          <button onclick="previewDoc('Proposal')">Preview</button>
          <button onclick="saveDoc('Proposal')">Save</button>
          <button onclick="emailDoc('Proposal')">Email</button>
        </div>
      `,

      invoice: `
        <h2>Quick Invoice</h2>

        <div class="auto-info">
          <p><strong>Client:</strong> ${userProfile.name}</p>
          <p><strong>Phone:</strong> ${userProfile.phone}</p>
          <p><strong>Email:</strong> ${userProfile.email}</p>
          <p><strong>Address:</strong> ${userProfile.address}</p>
        </div>

        <div class="field-row"><textarea id="work" placeholder="Work performed"></textarea></div>
        <div class="field-row"><input id="amount" placeholder="Amount due"></div>

        <div class="btn-row">
          <button onclick="previewDoc('Invoice')">Preview</button>
          <button onclick="saveDoc('Invoice')">Save</button>
          <button onclick="emailDoc('Invoice')">Email</button>
        </div>
      `
    };

    /* ============================================================
       TAB SWITCHING
    ============================================================= */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelector('.tab-btn.active').classList.remove('active');
        btn.classList.add('active');

        const doc = btn.dataset.doc;
        document.getElementById('docForm').innerHTML = templates[doc];
      });
    });

    /* ============================================================
       PREVIEW BUILDER
    ============================================================= */
    function previewDoc(type) {
      let html = `
        <h2>${type}</h2>
        <p><strong>Name:</strong> ${userProfile.name}</p>
        <p><strong>Phone:</strong> ${userProfile.phone}</p>
        <p><strong>Email:</strong> ${userProfile.email}</p>
        <p><strong>Address:</strong> ${userProfile.address}</p>
        <hr>
      `;

      document.querySelectorAll('#docForm input, #docForm textarea').forEach(field => {
        html += `<p><strong>${field.placeholder}:</strong> ${field.value}</p>`;
      });

      document.getElementById('previewContent').innerHTML = html;
    }

    /* ============================================================
       SAVE / EMAIL (placeholder functions)
    ============================================================= */
    function saveDoc(type) {
      alert(type + " saved!");
    }

    function emailDoc(type) {
      alert(type + " emailed!");
    }
  </script>

</body>
</html>
