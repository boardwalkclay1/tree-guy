<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contracts – Real Tree Guy OS</title>
  <link rel="icon" type="image/png" href="../../assets/icons/rtg-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* PAGE BACKGROUND — CONTRACTS THEME */
    body {
      background: #0d0f0d url("../../assets/icons/rtg-contracts.png")
        center center / cover no-repeat;
      background-attachment: fixed;
      color: #e8ffe8;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0 0 40px;
    }

    @media (max-width: 768px) {
      body {
        background: #0d0f0d url("../../public/assets/icons/rtg-contracts.png")
          center top / contain no-repeat;
        background-attachment: scroll;
      }
    }

    *, *::before, *::after { box-sizing: border-box; }

    header {
      text-align: center;
      padding: 20px;
      border-bottom: 2px solid #2e6b33;
      background: rgba(0,0,0,0.4);
    }

    header h1 {
      font-size: 2rem;
      color: #caffca;
      margin: 0;
    }

    .back-link {
      display: inline-block;
      margin-top: 8px;
      color: #a8ffa8;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .contract-card {
      max-width: 700px;
      margin: 30px auto;
      padding: 24px;
      background: rgba(20,35,20,0.85);
      border-radius: 16px;
      border: 1px solid #2e6b33;
    }

    label {
      display: block;
      margin-top: 14px;
      font-size: 0.95rem;
      color: #a8ffa8;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px 14px;
      margin-top: 6px;
      border-radius: 8px;
      border: 1px solid #2e6b33;
      background: rgba(15,30,15,0.9);
      color: #e8ffe8;
      font-size: 0.95rem;
    }

    textarea { height: 110px; }

    input:focus, textarea:focus {
      outline: none;
      border-color: #6aff6a;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
    }

    .action-row button {
      flex: 1;
      min-width: 120px;
      padding: 12px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: bold;
    }

    #fill { background: #2e6b33; color: #e8ffe8; }
    #fill:hover { background: #3fa63f; }

    #send { background: #1a4a8c; color: #e8ffe8; }
    #send:hover { background: #2260b8; }

    #save { background: #6b3b2e; color: #e8ffe8; }
    #save:hover { background: #934e3d; }

    #calendar { background: rgba(255,255,255,0.1); color: #e8ffe8; }
    #calendar:hover { background: rgba(255,255,255,0.18); }

    #previewBox {
      margin-top: 20px;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 0.85rem;
      background: rgba(0,0,0,0.4);
      padding: 16px;
      border-radius: 10px;
      border: 1px solid #2e6b33;
      min-height: 80px;
      color: #d8ffd8;
    }
  </style>
</head>

<body>

  <header>
    <h1>📄 Contracts Generator</h1>
    <a class="back-link" href="../../treeguy/dashboard.html">← Back to Dashboard</a>
  </header>

  <div class="contract-card">
    <h2 style="color:#caffca;margin-top:0;">Client Information</h2>

    <label>Client Name</label>
    <input id="clientName" placeholder="Full name">

    <label>Phone</label>
    <input id="clientPhone" placeholder="(555) 000-0000">

    <label>Email</label>
    <input id="clientEmail" type="email" placeholder="client@email.com">

    <label>Property Address</label>
    <input id="clientAddress" placeholder="123 Main St, City, State">

    <label>Scope of Work</label>
    <textarea id="scope" placeholder="Describe the tree work in detail…"></textarea>

    <label>Total Price</label>
    <input id="price" placeholder="e.g. $850.00">

    <div class="action-row">
      <button id="fill">Preview Contract</button>
      <button id="send">Send via Email</button>
      <button id="save">Save</button>
      <button id="calendar">Add to Calendar</button>
    </div>

    <div id="previewBox">Fill out the form above and click Preview to generate the contract.</div>
  </div>

  <script type="module" src="contracts.js"></script>

</body>
</html>
