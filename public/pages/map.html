<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Real Tree Map</title>

  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css">
  <script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>

  <link rel="stylesheet" href="../../assets/css/map.css">
</head>

<body>

<section class="shell">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <h2>Supply Finder</h2>

    <a href="/pages/dashboard.html" class="back-btn">← Back to Dashboard</a>

    <div id="locationStatus" class="status">Requesting location…</div>

    <label>Supply Filters</label>
    <div id="filterRow" class="pill-row">
      <button class="pill" data-type="home_depot">Home Depot</button>
      <button class="pill" data-type="lowes">Lowe's</button>
      <button class="pill" data-type="ace">Ace Hardware</button>
      <button class="pill" data-type="chainsaw">Chainsaw Shops</button>
      <button class="pill" data-type="woodworking">Woodworking Stores</button>
      <button class="pill" data-type="dump">Wood Dump Sites</button>
      <button class="pill" data-type="sawmill">Sawmills</button>
      <button class="pill" data-type="gas">Gas Stations</button>
    </div>

    <label>Search Any Address</label>
    <input id="clientAddress" placeholder="123 Oak St, Atlanta, GA">

    <div class="status">
      Filter: <span id="activeFilterLabel">None</span>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-wrap">
    <div id="map"></div>
  </div>

</section>

<script type="module" src="../../assets/js/map.js"></script>

</body>
</html>
