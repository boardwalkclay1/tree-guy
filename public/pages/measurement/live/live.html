<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Camera Measurement – Real Tree Guy OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../../assets/icons/rtg-192.png">
  <link rel="stylesheet" href="live.css">
</head>

<body>

  <header class="rtg-header">
    <h1>🎥 Live Camera Measurement</h1>
    <a class="back-link" href="measurement.html">← Back</a>
  </header>

  <main class="shell">

    <video id="camera" autoplay playsinline></video>

    <div class="controls">
      <label>Distance from Tree (ft)</label>
      <input type="number" id="liveDist" placeholder="e.g. 40">

      <button class="rtg-btn" id="setBase">Mark Base</button>
      <button class="rtg-btn" id="calcLive">Calculate Height</button>
    </div>

    <div class="result" id="liveResult"></div>

  </main>

  <script src="live.js"></script>
</body>
</html>
