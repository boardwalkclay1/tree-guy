<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Measurement – Real Tree Guy OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="../../assets/icons/rtg-192.png">
  <link rel="stylesheet" href="/pages/measurement/photo/photo.css">
</head>

<body>

  <header class="rtg-header">
    <h1>📸 Photo Measurement</h1>
    <a class="back-link" href="measurement.html">← Back</a>
  </header>

  <main class="shell">

    <input type="file" id="photoInput" accept="image/*">

    <canvas id="canvas"></canvas>

    <div class="controls">
      <label>Reference Height (ft)</label>
      <input type="number" id="refHeight" placeholder="e.g. 6">

      <button class="rtg-btn" id="calcPhoto">Calculate Height</button>
    </div>

    <div class="result" id="photoResult"></div>

  </main>

  <script src="/pages/measurement/photo/photo.js"></script>
</body>
</html>
