<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REAL TREE GUY – Dashboard</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="./assets/icons/rtg-192.png">

  <!-- DASHBOARD CSS -->
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>

<body class="rtg-dashboard">

  <!-- TOP BAR -->
  <div class="rtg-topbar">
    <div class="rtg-burger" id="rtgBurger">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- SIDEBAR (sidebar.js injects content) -->
  <nav class="rtg-sidemenu" id="rtgSidemenu"></nav>

  <!-- HEADER -->
  <header class="rtg-header">
    <h1 class="rtg-title">REAL TREE GUY</h1>
    <p class="rtg-subtitle">Modular Static OS for Tree Work</p>
  </header>

  <!-- WEATHER MODULE -->
  <section class="rtg-weather">
    <div class="weather-left">
      <h3 id="weatherTemp">--°</h3>
      <p id="weatherCondition">Loading...</p>
    </div>
    <div class="weather-right">
      <p id="weatherLocation">Locating...</p>
      <p id="weatherHighLow">H: --°  L: --°</p>
    </div>
  </section>

  <!-- TREE SYSTEM -->
  <main class="tree-menu">
    <div class="tree">

      <div class="canopy"></div>
      <div class="trunk"></div>

      <div class="branch b1 left">
        <div class="branch-bar"></div>
        <div class="branch-bush"></div>
        <a href="profile.html" class="branch-btn">Profile</a>
      </div>

      <div class="branch b2 right">
        <div class="branch-bar"></div>
        <div class="branch-bush"></div>
        <a href="customers.html" class="branch-btn">Customers & Jobs</a>
      </div>

      <div class="branch b3 left">
        <div class="branch-bar"></div>
        <div class="branch-bush"></div>
        <a href="flyers.html" class="branch-btn">Cards & Flyers</a>
      </div>

      <div class="branch b4 right">
        <div class="branch-bar"></div>
        <div class="branch-bush"></div>
        <a href="contracts.html" class="branch-btn">Contracts</a>
      </div>

      <div class="branch b5 left">
        <div class="branch-bar"></div>
        <div class="branch-bush"></div>
        <a href="measurement.html" class="branch-btn">Tree Measurement</a>
      </div>

      <div class="branch b6 right">
        <div class="branch-bar"></div>
        <div class="branch-bush"></div>
        <a href="calendar.html" class="branch-btn">Calendar</a>
      </div>

    </div>
  </main>

  <!-- REAL TREE SHOP BUTTON -->
  <div class="rtg-map-bottom">
    <a class="rtg-map-btn" href="shop.html">REAL TREE SHOP</a>
  </div>

  <!-- RTG MAP BUTTON -->
  <div class="rtg-map-bottom">
    <a class="rtg-map-btn" id="rtgMapBottom" href="map.html">RTG MAP</a>
  </div>

  <footer>
    © Real Tree Guy OS — All Rights Reserved
  </footer>

  <!-- MODULE SCRIPTS -->
  <script type="module" src="/pages/assets/js/sidebar.js"></script>
  <script type="module" src="/pages/assets/js/dashboard.js"></script>

</body>
</html>
