<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RTG Online — Tree Guy Dashboard</title>

  <link rel="icon" href="/public/assets/img/logos/rtg-online-logo.jpg" type="image/jpeg">
  <link rel="stylesheet" href="/rtg-online/tree-guy/css/rtg-dashboard.css">
</head>

<body>

  <!-- BACKGROUND -->
  <div id="rtgBackground"></div>

  <!-- TOP BAR -->
  <div class="rtg-topbar">
    <div class="rtg-topbar-left">
      <img src="/assets/img/logos/rtg-online-logo.jpg" class="rtg-logo">
      <div class="rtg-topbar-title">
        <div class="rtg-topbar-main">RTG ONLINE</div>
        <div class="rtg-topbar-sub">Tree Guy Social • Squads • Messaging • Jobs</div>
      </div>
    </div>

    <div class="rtg-topbar-right">
      <button class="rtg-top-btn" id="openSettings">⚙️</button>
      <button class="rtg-top-btn" id="openNotifications">🔔</button>
      <button class="rtg-top-btn" id="openMessages">💬</button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="tg-main">

    <!-- PROFILE HEADER -->
    <header class="tg-header glass-card">
      <img id="tgAvatar" class="tg-avatar">
      <div class="tg-header-info">
        <h1 id="tgName"></h1>
        <p id="tgHeaderMsg"></p>
        <p id="tgRole"></p>
        <p id="tgLocation"></p>
      </div>
    </header>

    <!-- GRID -->
    <div class="tg-grid">

      <!-- LEFT COLUMN -->
      <section class="tg-left glass-card">
        <h2>Clients</h2>
        <div id="tgClientsList"></div>

        <h2>Map</h2>
        <div id="tgMapList"></div>

        <h2>Squads</h2>
        <div id="tgSquadList"></div>

        <button id="createSquadBtn" class="rtg-btn">➕ Create Squad</button>
      </section>

      <!-- CENTER COLUMN (FULL SOCIAL MEDIA FEED) -->
      <section class="tg-center glass-card">

        <!-- POST CREATOR -->
        <div class="tg-create-post">
          <textarea id="tgPostContent" placeholder="Share a video, photo, or update..."></textarea>
          <input id="tgPostMediaUrl" type="text" placeholder="Media URL (optional)">
          <select id="tgPostType">
            <option value="text">Text</option>
            <option value="photo">Photo</option>
            <option value="video">Video</option>
          </select>
          <button id="tgPostSubmit" class="rtg-btn">Post</button>
        </div>

        <!-- FEED -->
        <div id="tgFeed" class="tg-feed"></div>

      </section>

      <!-- RIGHT COLUMN -->
      <section class="tg-right glass-card">

        <h2>Messages</h2>
        <div id="tgMessages"></div>

        <h2>Friends</h2>
        <div id="tgFriends"></div>

        <h2>Skills</h2>
        <ul id="tgSkills"></ul>
        <form id="tgSkillForm">
          <input id="tgSkillName" type="text" placeholder="Skill" required>
          <input id="tgSkillLevel" type="text" placeholder="Level" required>
          <button class="rtg-btn">Add Skill</button>
        </form>

        <h2>Equipment</h2>
        <ul id="tgEquipment"></ul>
        <form id="tgEquipmentForm">
          <input id="tgEquipmentName" type="text" placeholder="Equipment" required>
          <input id="tgEquipmentYears" type="number" placeholder="Years" required>
          <button class="rtg-btn">Add Equipment</button>
        </form>

      </section>

    </div>
  </main>

  <!-- SETTINGS PANEL -->
  <div id="tgSettingsPanel" class="tg-panel glass-card hidden">
    <h2>Settings</h2>
    <form id="tgProfileForm">
      <input id="tgProfileName" type="text" placeholder="Name" required>
      <input id="tgProfileRole" type="text" placeholder="Role" required>
      <input id="tgProfileCity" type="text" placeholder="City" required>
      <input id="tgProfileState" type="text" placeholder="State" required>
      <input id="tgProfileAvatar" type="text" placeholder="Avatar URL">
      <textarea id="tgProfileBio" placeholder="Bio"></textarea>
      <button class="rtg-btn">Save</button>
    </form>
  </div>

  <!-- NOTIFICATIONS PANEL -->
  <div id="tgNotificationsPanel" class="tg-panel glass-card hidden">
    <h2>Notifications</h2>
    <div id="tgNotifications"></div>
  </div>

  <!-- MESSAGES PANEL -->
  <div id="tgMessagesPanel" class="tg-panel glass-card hidden">
    <h2>Messages</h2>
    <div id="tgMessageThreads"></div>
  </div>

  <script src="/rtg-online/tree-guy/js/rtg-dash.js"></script>
</body>
</html>
