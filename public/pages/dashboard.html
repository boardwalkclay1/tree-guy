<!DOCTYPE html>
<html lang="en">
<head>

  <title>REAL TREE GUY – New Page</title>

      background: #0d0f0d url("../public/assets/icons/rtg-dash.png")

    }

    @media (max-width: 768px) {

          center top / contain no-repeat;
        background-attachment: scroll;
      }

    .rtg-page-wrapper {
      max-width: 900px;
      margin: 120px auto 60px;
      padding: 20px;
      background: rgba(0,0,0,0.45);
      border: 2px solid #2e6b33;
      border-radius: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 22px rgba(0,0,0,0.6);
      text-align: center;
    }

    .rtg-page-wrapper h1 {
      font-size: 2.6rem;
      font-weight: 900;
      color: #caffca;
      margin-bottom: 10px;
    }

    .rtg-page-wrapper p {
      font-size: 1.2rem;
      color: #d8ffd8;
      opacity: 0.9;

  <!-- INVISIBLE BACKDOOR HOTSPOT -->
