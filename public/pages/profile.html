<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile – Real Tree Guy OS</title>
  <link rel="icon" type="image/png" href="../../assets/icons/rtg-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/assets/css/profile.css">
</head>

<body>

  <header class="rtg-header">
    <h1>👤 Profile</h1>
    <a class="rtg-back" href="../../treeguy/dashboard.html">← Back to Dashboard</a>
  </header>

  <main class="profile-shell">

    <section class="profile-card">

      <h2>Your Information</h2>

      <label>Full Name</label>
      <input id="profName" placeholder="Your full name">

      <label>Business Name</label>
      <input id="profBiz" placeholder="Company name">

      <label>Phone</label>
      <input id="profPhone" placeholder="(555) 000-0000">

      <label>Email</label>
      <input id="profEmail" placeholder="you@email.com">

      <label>Address</label>
      <input id="profAddress" placeholder="123 Main St, City, State">

      <label>About / Bio</label>
      <textarea id="profBio" placeholder="Short description…"></textarea>

      <label>Logo Upload</label>
      <input type="file" id="profLogo" accept="image/*">

      <div class="logo-preview" id="logoPreview"></div>

      <button id="saveProfile" class="rtg-btn-green">💾 Save Profile</button>

    </section>

  </main>

  <script src="/pages/assets/js/profile.js"></script>
</body>
</html>
