<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Create Password – Real Tree Guy OS</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      font-family: Arial, sans-serif;
      color: #caffca;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      height: 100vh;
    }

    h1 {
      margin-top: 60px;
      font-size: 2rem;
      color: #2e6b33;
      text-shadow: 0 0 12px rgba(46,107,51,0.6);
    }

    .card {
      margin-top: 40px;
      background: rgba(0,0,0,0.55);
      padding: 30px;
      border-radius: 18px;
      width: 320px;
      box-shadow: 0 0 22px rgba(0,0,0,0.7);
      border: 2px solid #2e6b33;
      backdrop-filter: blur(6px);
    }

    .card input {
      width: 100%;
      padding: 14px;
      margin-bottom: 18px;
      border-radius: 999px;
      border: 2px solid #2e6b33;
      background: rgba(0,0,0,0.55);
      color: #caffca;
      font-size: 1rem;
      outline: none;
    }

    .card input::placeholder {
      color: #8fbf8f;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 999px;
      border: 2px solid #2e6b33;
      background: #2e6b33;
      color: #caffca;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #3c8a44;
    }

    p {
      text-align: center;
      margin-top: 18px;
      color: #8fbf8f;
    }
  </style>
</head>

<body>

  <h1>Create Your Password</h1>

  <div class="card">
    <input id="email" type="email" placeholder="Confirm your email">
    <input id="password" type="password" placeholder="Create password">
    <input id="password2" type="password" placeholder="Confirm password">

    <button id="saveBtn">Save Password</button>

    <p>This will unlock your Real Tree Guy OS account.</p>
  </div>

  <script type="module">
    import { saveUser } from "../assets/js/auth.js";

    document.getElementById("saveBtn").onclick = async () => {
      const email = document.getElementById("email").value.trim();
      const pass1 = document.getElementById("password").value.trim();
      const pass2 = document.getElementById("password2").value.trim();

      if (!email || !pass1 || !pass2) {
        alert("Fill out all fields.");
        return;
      }

      if (pass1 !== pass2) {
        alert("Passwords do not match.");
        return;
      }

      // Save to IndexedDB
      await saveUser(email, pass1);

      // Unlock OS
      localStorage.setItem("rtg_unlocked", "true");

      alert("Password created! Redirecting...");
      window.location.href = "dashboard.html";
    };
  </script>

</body>
</html>
