<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calendar – Real Tree Guy OS</title>

  <link rel="icon" type="image/png" href="../../assets/icons/rtg-192.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../../assets/css/calendar.css">
</head>

<body>

  <header>
    <h1>📅 Tree Guy Calendar</h1>
    <a class="back-link" href="../../pages/dashboard.html">← Back to Dashboard</a>
  </header>

  <div class="cal-nav">
    <button id="prev">◀ Prev</button>
    <div id="monthLabel"></div>
    <button id="next">Next ▶</button>
  </div>

  <div class="cal-grid" id="calendarGrid"></div>

  <!-- EVENT MODAL -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <h2 id="modalDate"></h2>

      <label>Event Title</label>
      <input id="eventTitle">

      <label>Type</label>
      <select id="eventType">
        <option value="task">Task</option>
        <option value="contract">Contract / Job</option>
        <option value="bid">Bid</option>
        <option value="reminder">Reminder</option>
      </select>

      <label id="contractLabel" class="hidden">Contract ID</label>
      <input id="contractId" class="hidden">

      <label>Notes</label>
      <textarea id="eventNotes"></textarea>

      <div class="modal-actions">
        <button id="saveEvent">Save</button>
        <button id="closeModal">Cancel</button>
      </div>
    </div>
  </div>

  <!-- DB ENGINE FIRST -->
  <script type="module" src="../../assets/js/db.js"></script>

  <!-- CALENDAR LOGIC SECOND (FIXED PATH) -->
  <script type="module" src="../pages/assets/js/calendar.js"></script>

</body>
</html>
