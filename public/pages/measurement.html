<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>REAL TREE GUY – AR Measurement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="/assets/icons/rtg-192.png">
  <link rel="stylesheet" href="/assets/css/measurement.css">
</head>
<body class="rtg-measure-body">

  <!-- FULLSCREEN CAMERA LAYER -->
  <video id="arVideo" class="rtg-video" autoplay playsinline></video>
  <canvas id="arCanvas" class="rtg-canvas"></canvas>

  <!-- WATERMARK HUD OVERLAY -->
  <div class="rtg-hud">
    <div class="hud-row">
      <span class="hud-label">a:</span><span id="hudA" class="hud-value">-- px</span>
      <span class="hud-label">b:</span><span id="hudB" class="hud-value">-- px</span>
      <span class="hud-label">c:</span><span id="hudC" class="hud-value">-- px</span>
      <span class="hud-label">a²+b²:</span><span id="hudCheck" class="hud-value">--</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Tie‑in:</span><span id="hudTie" class="hud-value">Scanning…</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Rigging:</span><span id="hudRig" class="hud-value">Scanning…</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Hazard:</span><span id="hudHazard" class="hud-value">--</span>
    </div>
  </div>

  <!-- SMALL LOGO WATERMARK -->
  <div class="rtg-logo-mark">
    <img src="/assets/img/rtg-logo.jpg" alt="RTG" />
  </div>

  <script src="/assets/js/measurement-ar.js"></script>
</body>
</html>
