<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RTG – AR Measurement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/assets/css/measurement.css">
</head>

<body>

  <div id="arContainer" class="ar-container">
    <video id="arVideo" autoplay playsinline></video>
    <canvas id="arCanvas"></canvas>

    <!-- HUD (watermark math) -->
    <div class="ar-hud">
      <div class="hud-line">a: <span id="hudA">--</span></div>
      <div class="hud-line">b: <span id="hudB">--</span></div>
      <div class="hud-line">c: <span id="hudC">--</span></div>
      <div class="hud-line">a² + b² ≈ c²: <span id="hudCheck">--</span></div>
      <div class="hud-line">Tie‑In: <span id="hudTie">--</span></div>
      <div class="hud-line">Rigging: <span id="hudRig">--</span></div>
    </div>
  </div>

  <script src="/assets/js/measurement.js"></script>
</body>
</html>
