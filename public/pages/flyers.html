<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Real Tree Guy – Cards & Flyers</title>

  <link rel="stylesheet" href="/assets/css/flyer.css">
</head>

<body>

  <header class="rtg-header">
    <h1>🎨 Cards & Flyers Studio</h1>
    <a href="/pages/dashboard.html" class="rtg-back">← Back</a>
  </header>

  <main class="flyer-shell">

    <!-- LEFT PANEL -->
    <section class="flyer-controls">

      <h2>Design Controls</h2>

      <div class="mode-toggle">
        <button id="modeCard" class="active">Card</button>
        <button id="modeFlyer">Flyer</button>
        <button id="modeDoorHanger">Door Hanger</button>
      </div>

      <label>Headline</label>
      <input id="headline" placeholder="Professional Tree Removal">

      <label>Description</label>
      <textarea id="body" placeholder="Describe your service..."></textarea>

      <label>Offer / CTA</label>
      <input id="offer" placeholder="10% Off This Week">

      <label>Background Image</label>
      <input type="file" id="bgUpload" accept="image/*">

      <label>Background Strength</label>
      <input type="range" id="bgStrength" min="0" max="100" value="25">

      <label>Logo Override</label>
      <input type="file" id="logoUpload" accept="image/*">

      <label>Background Color</label>
      <input type="color" id="bgColor" value="#ffffff">

      <label>Text Color</label>
      <input type="color" id="textColor" value="#111827">

      <label>Accent Color</label>
      <input type="color" id="accentColor" value="#4caf50">

      <button id="saveDesign" class="rtg-btn-green">Save Design</button>

      <div class="actions-row">
        <button id="printFlyer" class="rtg-btn-blue">Print</button>
        <button id="emailFlyer" class="rtg-btn-purple">Email</button>
        <button id="shareFlyer" class="rtg-btn-green">Share</button>
        <button id="fullscreenFlyer" class="rtg-btn-orange">Fullscreen</button>
      </div>

    </section>

    <!-- RIGHT PANEL -->
    <section class="flyer-preview">
      <h2>Live Preview</h2>

      <div id="preview" class="preview-base card-mode">

        <div id="previewBg" class="preview-bg"></div>

        <div id="previewLogo" class="preview-logo"></div>

        <div class="preview-content">
          <div id="previewHeadline" class="flyer-headline">Your Headline</div>
          <div id="previewBody" class="flyer-body">Your description goes here.</div>
          <div id="previewOffer" class="flyer-offer">Your offer goes here.</div>
        </div>

        <div id="previewContact" class="flyer-contact">
          Business Name • Phone • Email
        </div>

      </div>
    </section>

  </main>

  <script type="module" src="/assets/js/db.js"></script>
  <script type="module" src="/pages/assets/js/flyers.js"></script>

</body>
</html>
