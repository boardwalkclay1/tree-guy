<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Real Tree Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" href="/assets/icons/rtg-192.png">
  <link rel="apple-touch-icon" href="/assets/icons/rtg-192.png">
  <link rel="manifest" href="/manifest.json">

  <link rel="stylesheet" href="/assets/css/index.css">
  <link rel="stylesheet" href="/assets/css/real-tree-shop.css">
</head>
<body>

  <header class="rtg-shop-header">
    <div class="rtg-shop-brand">
      <h1>REAL TREE SHOP</h1>
      <p>Curated Real Tree Guy print products and gear, ready to order.</p>
    </div>
    <div class="rtg-shop-cart">
      <button id="cartButton" class="rtg-shop-cart-btn">
        Cart <span id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main class="rtg-shop-main">
    <aside class="rtg-shop-sidebar">
      <h2>Categories</h2>
      <ul id="categoryList" class="rtg-shop-category-list">
        <!-- Filled by JS -->
      </ul>
    </aside>

    <section class="rtg-shop-content">
      <div class="rtg-shop-toolbar">
        <h2 id="currentCategoryLabel">All Products</h2>
        <input
          id="productSearch"
          type="search"
          placeholder="Search products…"
          class="rtg-shop-search"
        >
      </div>

      <div id="productGrid" class="rtg-shop-grid">
        <!-- Products injected by JS -->
      </div>
    </section>
  </main>

  <!-- CART DRAWER -->
  <div id="cartDrawer" class="rtg-shop-cart-drawer">
    <div class="rtg-shop-cart-header">
      <h2>Your Cart</h2>
      <button id="closeCart" class="rtg-shop-cart-close">✕</button>
    </div>
    <div id="cartItems" class="rtg-shop-cart-items"></div>
    <div class="rtg-shop-cart-footer">
      <div class="rtg-shop-cart-total">
        Total: $<span id="cartTotal">0.00</span>
      </div>
      <button id="checkoutButton" class="rtg-shop-checkout-btn">
        Review & Place Order
      </button>
    </div>
  </div>

  <div id="cartOverlay" class="rtg-shop-cart-overlay"></div>

  <!-- CHECKOUT MODAL -->
  <div id="checkoutModal" class="rtg-shop-modal hidden">
    <div class="rtg-shop-modal-inner">
      <h2>Checkout – Real Tree Guy</h2>

      <div class="rtg-shop-checkout-grid">
        <div>
          <h3>Customer Info</h3>
          <label>Name</label>
          <input id="custName" placeholder="Full name">

          <label>Email</label>
          <input id="custEmail" placeholder="email@example.com">

          <label>Phone</label>
          <input id="custPhone" placeholder="(555) 000-0000">

          <label>Address</label>
          <textarea id="custAddress" placeholder="Full shipping address"></textarea>
        </div>

        <div>
          <h3>Logo (optional)</h3>
          <p>For products that allow custom logo, upload it here.</p>
          <input type="file" id="logoFile" accept="image/*">
          <div id="logoPreview" class="rtg-shop-logo-preview"></div>
        </div>
      </div>

      <div class="rtg-shop-modal-actions">
        <button id="cancelCheckout" class="rtg-shop-btn-secondary">Cancel</button>
        <button id="confirmCheckout" class="rtg-shop-btn-primary">
          Place Order
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/pages/assets/js/real-tree-shop.js"></script>
</body>
</html>
