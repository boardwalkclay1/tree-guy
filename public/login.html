<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Tree Guy Login</title>
  <link rel="stylesheet" href="../styles.css">
</head>

<body class="auth-page">

  <h1>Tree Guy Login</h1>

  <div class="auth-card">
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn" class="btn-primary">Login</button>

    <p style="margin-top:15px;">
      Don’t have an account?
      <a href="paywall.html">Unlock OS</a>
    </p>
  </div>

  <script type="module">
    import { loginTreeGuy } from "../api/auth.js";

    document.getElementById("loginBtn").onclick = async () => {
      const email = email.value.trim();
      const password = password.value.trim();

      const ok = await loginTreeGuy(email, password);
      if (ok) window.location.href = "../dashboard/index.html";
    };
  </script>

</body>
</html>
