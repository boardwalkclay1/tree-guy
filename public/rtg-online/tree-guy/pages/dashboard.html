<!DOCTYPE html>
<html>
<head>
  <title>RTG Online — Tree Guy Dashboard</title>
  <link rel="stylesheet" href="/rtg-online/tree-guy/css/dashboard.css">
</head>

<body>

<header class="tg-header">
  <img id="tgAvatar" class="tg-avatar">
  <div class="tg-info">
    <h1 id="tgName"></h1>
    <p id="tgAddress"></p>
    <p id="tgBio"></p>
  </div>
</header>

<main class="tg-main">

  <section>
    <h2>Customers</h2>
    <div id="customersList"></div>
  </section>

  <section>
    <h2>Jobs</h2>
    <div id="jobsList"></div>
  </section>

  <section>
    <h2>Calendar</h2>
    <div id="eventsList"></div>
  </section>

  <section>
    <h2>Saved Map Locations</h2>
    <div id="mapList"></div>
  </section>

  <section>
    <h2>Nearby Clients</h2>
    <div id="nearbyList"></div>
  </section>

  <section>
    <h2>Social Feed</h2>
    <div id="socialFeed"></div>
  </section>

</main>

<script src="/rtg-online/tree-guy/js/rtg-dash.js"></script>
</body>
</html>
