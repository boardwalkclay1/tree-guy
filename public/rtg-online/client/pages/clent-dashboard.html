<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RTG Online – Client Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/rtg-online/client/css/clien-dashboard.css">
</head>
<body class="rtg-online-client">

  <header class="rtg-online-header">
    <div class="rtg-online-logo">RTG Online</div>
    <div class="rtg-online-user">
      <span id="clientNameDisplay">Client</span>
    </div>
  </header>

  <main class="rtg-online-main">

    <!-- LEFT: JOB POSTING -->
    <section class="rtg-online-panel rtg-online-panel--post">
      <h2>Post a Tree Job</h2>

      <form id="jobForm" class="job-form">
        <label>
          Job Title
          <input type="text" id="jobTitle" required>
        </label>

        <label>
          Description
          <textarea id="jobDescription" rows="4" required></textarea>
        </label>

        <label>
          Budget (USD)
          <input type="number" id="jobBudget" min="0" step="1" required>
        </label>

        <label>
          Address
          <input type="text" id="jobAddress" required>
        </label>

        <label>
          Photos
          <input type="file" id="jobPhotos" multiple accept="image/*">
        </label>

        <div class="job-payment">
          <div class="job-payment-info">
            <strong>Listing Fee:</strong> $10 per job
          </div>
          <button type="button" id="jobPayAndPostBtn" class="rtg-btn rtg-btn--primary">
            Pay $10 & List Job
          </button>
        </div>
      </form>
    </section>

    <!-- RIGHT: JOBS + MATCHED TREE GUYS -->
    <section class="rtg-online-panel rtg-online-panel--jobs">
      <h2>Your Job Listings</h2>
      <div id="clientJobsList" class="jobs-list">
        <p class="jobs-empty">No jobs posted yet.</p>
      </div>
    </section>

    <!-- MODAL: TREE GUY PROFILE -->
    <div id="treeGuyProfileModal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="closeTreeGuyProfile">&times;</button>
        <div id="treeGuyProfileBody">Loading profile…</div>
      </div>
    </div>

    <!-- MODAL: MESSAGING -->
    <div id="messageModal" class="modal hidden">
      <div class="modal-content">
        <button class="modal-close" id="closeMessageModal">&times;</button>
        <h3>Message Tree Guy</h3>
        <div id="messageThread" class="message-thread"></div>
        <div class="message-input-row">
          <input type="text" id="messageInput" placeholder="Type a message…">
          <button id="sendMessageBtn" class="rtg-btn rtg-btn--primary">Send</button>
        </div>
      </div>
    </div>

  </main>

  <script src="/rtg-online/client/js/client-dashboard.js" type="module"></script>
</body>
</html>
